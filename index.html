    <title>CBT Examination</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .cbt-container {
            background: #fff;
            width: 90%;
            max-width: 800px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-height: 85vh; /* Keeps the container from growing taller than the screen */
            overflow-y: auto; /* Adds a scrollbar inside the container if content is too long */
        }
        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .timer {
            font-size: 1.2em;
            font-weight: bold;
            color: #d9534f;
        }
        .question-number {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }
        .question-text {
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #444;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-label {
            background: #f9f9f9;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-label:hover {
            background: #e9ecef;
        }
        .option-label input {
            margin-right: 10px;
        }
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: #fff;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.8;
        }
        .btn-prev { background-color: #6c757d; }
        .btn-next { background-color: #007bff; }
        .btn-submit { background-color: #28a745; display: none; }
        
        #result-container {
            text-align: center;
            display: none;
        }
        .score-display {
            font-size: 2em;
            color: #28a745;
            margin-bottom: 20px;
        }

        #review-container {
            text-align: left;
            margin-top: 20px;
            border-top: 2px solid #e0e0e0;
            padding-top: 20px;
        }
        .review-item {
            background: #fdfdfd;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .review-question {
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        .correct-ans {
            color: #28a745;
            font-weight: bold;
        }
        .wrong-ans {
            color: #d9534f;
            font-weight: bold;
            text-decoration: line-through;
        }
        .unanswered {
            color: #f0ad4e;
            font-weight: bold;
        }
    </style>
</head>

            <button class="btn-submit" id="btn-submit" onclick="submitExam()">Submit Exam</button>

    </div>

        // SHUFFLE ALGORITHM: Scrambles the master array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // SELECT 35 QUESTIONS: Shuffles the full bank and extracts exactly 35
        // If your bank has less than 35 currently, it will just use what is available.
        let questions = shuffleArray(fullQuestionBank).slice(0, 35);

        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let timeRemaining = 2400; // 1 Hour in seconds (Adjust if needed)
        let timerInterval;

        const questionNumberEl = document.getElementById('question-number');
        const questionTextEl = document.getElementById('question-text');
        const optionsContainerEl = document.getElementById('options-container');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnSubmit = document.getElementById('btn-submit');
        const timerEl = document.getElementById('timer');
        const reviewContainerEl = document.getElementById('review-container');


        function startTimer() {
            // Set starting time to 30 minutes (30 * 60 = 1800 seconds)
            timeRemaining = 1800; 

            timerInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                } else {
                    timeRemaining--;
                    // Standard time math: 3600 seconds in 1 hour, 60 seconds in 1 minute
                    let hours = Math.floor(timeRemaining / 3600);
                    let minutes = Math.floor((timeRemaining % 3600) / 60);
                    let seconds = timeRemaining % 60;
                    
                    hours = hours < 10 ? "0" + hours : hours;
                    minutes = minutes < 10 ? "0" + minutes : minutes;
                    seconds = seconds < 10 ? "0" + seconds : seconds;
                    
                    timerEl.innerText = `Time Left: ${hours}:${minutes}:${seconds}`;
                }
            }, 1000);
        }

        function loadQuestion(index) {
            const q = questions[index];
            questionNumberEl.innerText = `Question ${index + 1} of ${questions.length}`;
            questionTextEl.innerText = q.question;
            
            optionsContainerEl.innerHTML = '';
            
            q.options.forEach((option, i) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'option';
                radio.value = i;
                
                if (userAnswers[index] === i) {
                    radio.checked = true;
                }
                
                radio.addEventListener('change', (e) => {
                    userAnswers[currentQuestionIndex] = parseInt(e.target.value);
                });

                label.appendChild(radio);
                label.appendChild(document.createTextNode(option));
                optionsContainerEl.appendChild(label);
            });

            btnPrev.style.visibility = index === 0 ? 'hidden' : 'visible';
            
            if (index === questions.length - 1) {
                btnNext.style.display = 'none';
                btnSubmit.style.display = 'inline-block';
            } else {
                btnNext.style.display = 'inline-block';
                btnSubmit.style.display = 'none';
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion(currentQuestionIndex);
            }
        }

        function submitExam() {
            clearInterval(timerInterval);
            let score = 0;
            let reviewHTML = '<h3>Review of Missed Questions:</h3>';
            let missedCount = 0;
            
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] === questions[i].answer) {
                    score++;
                } else {
                    missedCount++;
                    let userAnswerText = userAnswers[i] !== null ? questions[i].options[userAnswers[i]] : '<span class="unanswered">Not Answered</span>';
                    let correctAnswerText = questions[i].options[questions[i].answer];

                    reviewHTML += `
                        <div class="review-item">
                            <div class="review-question">Q${i + 1}. ${questions[i].question}</div>
                            <div>Your Answer: <span class="wrong-ans">${userAnswerText}</span></div>
                            <div>Correct Answer: <span class="correct-ans">${correctAnswerText}</span></div>
                        </div>
                    `;
                }
            }

            if (missedCount === 0) {
                reviewHTML += `<p style="color: #28a745; font-weight: bold;">Perfect score! You didn't miss any questions.</p>`;
            }
            
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('score-display').innerText = `Your Score: ${score*2} / ${questions.length*2}`;
            reviewContainerEl.innerHTML = reviewHTML;
        }

        loadQuestion(currentQuestionIndex);
        startTimer();

    </script>
